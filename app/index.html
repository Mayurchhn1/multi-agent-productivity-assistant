<!DOCTYPE html>
<html>
<head>
    <title>AI Productivity Assistant</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #eef2f7, #f8fafc);
            padding: 40px;
        }

        .container {
            max-width: 950px;
            margin: auto;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .input-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        input {
            width: 60%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            background: #6366f1;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #4f46e5;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            text-align: left;
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        #loading {
            margin-top: 20px;
            color: #555;
            white-space: pre-line;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>⚡ AI Productivity Assistant</h1>
    <div class="subtitle">
        Multi-Agent Decision Engine for Smarter Execution
    </div>

    <div class="input-box">
        <input type="text" id="query" placeholder="Try: Client not responding after proposal" />
        <button onclick="runAI()">Generate Strategy</button>
    </div>

    <div id="loading"></div>

    <div class="grid" id="output" style="display:none;">

        <!-- 🧠 Sales -->
        <div class="card">
            <div class="title">🧠 Sales Insight</div>
            <div id="sales"></div>
            <button onclick="copyText('sales')" style="margin-top:10px;">Copy</button>
        </div>

        <!-- 📋 Tasks -->
        <div class="card">
            <div class="title">📋 Action Tasks</div>
            <div id="tasks"></div>
            <button onclick="copyText('tasks')" style="margin-top:10px;">Copy</button>
        </div>

        <!-- 📅 Planning -->
        <div class="card">
            <div class="title">📅 Execution Plan</div>
            <div id="planning"></div>
            <button onclick="copyText('planning')" style="margin-top:10px;">Copy</button>
        </div>

    </div>

</div>

<script>
async function runAI() {
    const query = document.getElementById("query").value;

    document.getElementById("loading").innerText =
        "🧠 Sales Agent analyzing...\n📋 Task Agent planning...\n📅 Strategy Agent structuring...";
    document.getElementById("output").style.display = "none";

    fetch("https://task-automation-ai-10.emergent.host/api/run-agent", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ query })
    });

    const data = await response.json();

    document.getElementById("loading").innerText = "";
    document.getElementById("output").style.display = "grid";

    document.getElementById("sales").innerHTML =
        (data.sales || "No sales insight")
            .replace(/•/g, "🔹")
            .replace(/\n/g, "<br>");

    document.getElementById("tasks").innerHTML =
        (data.tasks || "No tasks")
            .replace(/•/g, "🔹")
            .replace(/\n/g, "<br>");

    document.getElementById("planning").innerHTML =
        (data.planning || "No plan")
            .replace(/Morning:/g, "🔹 Morning:")
            .replace(/Afternoon:/g, "<br>🔹 Afternoon:")
            .replace(/Evening:/g, "<br>🔹 Evening:")
            .replace(/\n/g, "<br>");
}

function copyText(id) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text);
    alert("✅ Copied to clipboard!");
}
</script>

</body>
</html>
