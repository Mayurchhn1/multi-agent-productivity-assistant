<!DOCTYPE html>
<html>
<head>
    <title>FlowPlan AI</title>

<style>
:root {
  --bg: #020617;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #e2e8f0;
  --muted: #94a3b8;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: var(--text);
  padding: 40px;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  text-align: center;
}

h1 {
  font-size: 40px;
  font-weight: 700;
  background: linear-gradient(to right, #fff, #a5b4fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: var(--muted);
  margin-bottom: 8px;
}

.subtext {
  opacity: 0.6;
  font-size: 14px;
  margin-bottom: 30px;
}

.input-box {
  background: var(--glass);
  backdrop-filter: blur(16px);
  padding: 24px;
  border-radius: 16px;
  border: 1px solid var(--border);
}

input {
  width: 60%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
}

button {
  padding: 14px 22px;
  margin-left: 10px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  transform: translateY(-2px);
}

.quick-buttons {
  margin-top: 15px;
}

.quick-buttons button {
  background: rgba(255,255,255,0.06);
  margin: 5px;
}

.summary {
  margin-top: 25px;
  padding: 18px;
  background: var(--glass);
  border-radius: 12px;
  border: 1px solid var(--border);
  text-align: left;
}

.grid {
  display: grid;
  gap: 16px;
  margin-top: 20px;
}

.card {
  background: var(--glass);
  padding: 18px;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.meta {
  opacity: 0.6;
  font-size: 13px;
}

.priority {
  margin-top: 6px;
  color: #a5b4fc;
}

</style>
</head>

<body>

<div class="container">

<h1>From idea → execution plan in seconds</h1>

<div class="subtitle">
  Turn intent into structured action — instantly.
</div>

<div class="subtext">
  No fluff. Just a plan you can execute immediately.
</div>

<div class="input-box">
  <input id="query" placeholder="What do you want to achieve today?" />
  <button onclick="runAI()">Create Plan</button>

  <div class="quick-buttons">
    <button onclick="quickFill('Plan my day for sales')">Sales</button>
    <button onclick="quickFill('Organize my work tasks')">Work</button>
    <button onclick="quickFill('Build a learning routine')">Learning</button>
  </div>
</div>

<div id="loading"></div>
<div id="summary"></div>
<div class="grid" id="output"></div>

</div>

<script>
function quickFill(text){
  document.getElementById("query").value=text;
  runAI();
}

async function runAI(){
  const query=document.getElementById("query").value.trim();
  if(!query) return alert("Enter something");

  const loading=document.getElementById("loading");
  const output=document.getElementById("output");
  const summary=document.getElementById("summary");

  loading.innerHTML="⚡ Thinking like an operator...";
  output.innerHTML="";
  summary.innerHTML="";

  try{
    const res=await fetch("/run",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query})
    });

    const data=await res.json();
    loading.innerHTML="";

    if(data.mode==="error"){
      summary.innerHTML=`<div class="summary">⚠️ ${data.summary}</div>`;
      return;
    }

    summary.innerHTML=`
      <div class="summary">
        <div style="font-size:12px;opacity:0.5">${data.mode.toUpperCase()} MODE</div>
        ${data.summary}
        <div style="margin-top:10px;font-size:13px;opacity:0.6;">
          Start with: <b>${data.plan[0]?.task||''}</b>
        </div>
      </div>
    `;

    data.plan.forEach(item=>{
      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <b>${item.task}</b>
        <div class="meta">${item.time} • ${item.type}</div>
        <div class="priority">Priority: ${item.priority}</div>
      `;

      output.appendChild(div);
    });

  }catch{
    loading.innerHTML="⚠️ Error connecting";
  }
}

document.getElementById("query").addEventListener("keypress",e=>{
  if(e.key==="Enter") runAI();
});
</script>

</body>
</html>
