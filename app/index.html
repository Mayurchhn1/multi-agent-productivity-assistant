<!DOCTYPE html>
<html>
<head>
  <title>FlowPlan AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
:root {
  --bg: #020617;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #8b5cf6;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: var(--text);
  padding: 40px;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: auto;
  text-align: center;
}

h1 {
  font-size: 36px;
  background: linear-gradient(to right, #fff, #a5b4fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: var(--muted);
  margin-bottom: 20px;
}

/* 🔷 INPUT BOX */
.input-box {
  background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
  backdrop-filter: blur(18px);
  padding: 28px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.input-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}

input {
  flex: 1;
  max-width: 520px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.06);
  color: white;
  outline: none;
}

button {
  padding: 14px 24px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  cursor: pointer;
}

.quick-buttons {
  margin-top: 18px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

.quick-buttons button {
  background: rgba(255,255,255,0.06);
}

.summary, .card {
  background: var(--glass);
  padding: 18px;
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-top: 15px;
  text-align: left;
}

.grid {
  display: grid;
  gap: 16px;
  margin-top: 20px;
}

.meta {
  font-size: 13px;
  opacity: 0.6;
}

.priority {
  color: #a5b4fc;
}

#loading {
  margin-top: 20px;
  color: var(--accent);
}

@media (max-width: 600px) {
  .input-row {
    flex-direction: column;
  }
  button {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>FlowPlan AI</h1>
<div class="subtitle">Turn intent into execution instantly</div>

<div class="input-box">

  <div class="input-row">
    <input id="query" placeholder="What do you want to achieve today?" />
    <button onclick="runAI()">Create Plan</button>
  </div>

  <div class="quick-buttons">
    <button onclick="quickFill('Plan my sales day')">Sales</button>
    <button onclick="quickFill('Organize my work tasks')">Work</button>
    <button onclick="quickFill('Build a learning routine')">Learning</button>
  </div>

  <div id="llmStatus" class="meta"></div>

</div>

<div id="loading"></div>
<div id="summary"></div>
<div class="grid" id="output"></div>

<!-- DASHBOARD -->
<div class="grid">

  <div class="card">
    <b>Top Priorities</b>
    <div id="priorities" class="meta"></div>
  </div>

  <div class="card">
    <b>Recent Actions</b>
    <div id="history" class="meta"></div>
  </div>

</div>

</div>

<script>

// ✅ FIXED (no auto run)
function quickFill(text){
  document.getElementById("query").value = text;
}

async function runAI(){
  const query = document.getElementById("query").value.trim();
  if(!query) return alert("Enter something");

  document.getElementById("loading").innerText = "⚡ Generating...";
  document.getElementById("output").innerHTML = "";
  document.getElementById("summary").innerHTML = "";

  try{
    const res = await fetch("/run", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({query})
    });

    const data = await res.json();

    document.getElementById("loading").innerText = "";

    document.getElementById("llmStatus").innerText =
      data.llm_error ? "⚠️ Fallback Mode" : "✅ AI Active";

    document.getElementById("summary").innerHTML = `
      <div class="summary">
        <div class="meta">${(data.mode || "").toUpperCase()}</div>
        ${data.summary || ""}
      </div>
    `;

    (data.plan || []).forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${item.task}</b>
        <div class="meta">${item.time || "Now"} • ${item.type}</div>
        <div class="priority">Priority: ${item.priority}</div>
      `;

      document.getElementById("output").appendChild(div);
    });

  } catch(e){
    document.getElementById("loading").innerText = "Error";
  }
}

async function loadDashboard(){
  const res = await fetch("/dashboard");
  const d = await res.json();

  document.getElementById("priorities").innerHTML =
    (d.top_priorities || []).map(x =>
      `${x.client_name} - ₹${x.value}`
    ).join("<br>") || "No deals";

  document.getElementById("history").innerHTML =
    (d.recent_actions || []).map(x =>
      `${x.task || ""}`
    ).join("<br>") || "No activity";
}

document.getElementById("query").addEventListener("keypress", function(e){
  if(e.key === "Enter") runAI();
});

loadDashboard();

</script>

</body>
</html>
