<!DOCTYPE html>
<html>
<head>
<title>FlowPlan AI</title>

<style>
:root {
  --bg-main: #020617;
  --bg-soft: #0f172a;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #6366f1;
  --accent-2: #8b5cf6;
}

/* ===== BODY ===== */
body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: var(--text);
  padding: 40px;
  margin: 0;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 900px;
  margin: auto;
  text-align: center;
}

/* ===== HEADLINE ===== */
h1 {
  font-size: 42px;
  font-weight: 700;
  margin-bottom: 10px;
  background: linear-gradient(to right, #fff, #a5b4fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  color: var(--muted);
  margin-bottom: 6px;
}

.subtext {
  opacity: 0.6;
  font-size: 14px;
  margin-bottom: 30px;
}

/* ===== GLASS CARD ===== */
.input-box {
  background: var(--glass);
  backdrop-filter: blur(16px);
  padding: 28px;
  border-radius: 18px;
  border: 1px solid var(--border);
  box-shadow:
    0 25px 70px rgba(0,0,0,0.7),
    0 0 40px rgba(99,102,241,0.15);
  transition: 0.25s ease;
}

.input-box:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.15);
}

/* ===== INPUT ===== */
input {
  width: 60%;
  padding: 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06);
  color: white;
  outline: none;
  transition: 0.2s;
}

input::placeholder {
  color: #64748b;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(99,102,241,0.3);
}

/* ===== BUTTON ===== */
button {
  padding: 16px 26px;
  margin-left: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  border-radius: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.25s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(99,102,241,0.5);
}

/* ===== QUICK BUTTONS ===== */
.quick-buttons {
  margin-top: 18px;
}

.quick-buttons button {
  background: rgba(255,255,255,0.06);
  color: #cbd5f5;
  margin: 6px;
  padding: 10px 16px;
  border-radius: 20px;
  font-size: 13px;
}

.quick-buttons button:hover {
  background: rgba(255,255,255,0.12);
}

/* ===== SUMMARY ===== */
.summary {
  margin-top: 28px;
  padding: 20px;
  background: var(--glass);
  border-radius: 14px;
  border: 1px solid var(--border);
  text-align: left;
  backdrop-filter: blur(10px);
  animation: fadeIn 0.3s ease;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  gap: 16px;
  margin-top: 20px;
}

/* ===== CARD ===== */
.card {
  background: var(--glass);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 14px;
  border: 1px solid var(--border);
  transition: 0.25s ease;
  animation: fadeIn 0.3s ease;
}

.card:hover {
  transform: translateY(-3px);
  border-color: rgba(255,255,255,0.15);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ===== TEXT ===== */
.meta {
  opacity: 0.6;
  font-size: 13px;
  margin-top: 4px;
}

.priority {
  margin-top: 8px;
  font-weight: 600;
  color: #a5b4fc;
}

/* ===== LOADING ===== */
#loading {
  margin-top: 20px;
  color: var(--muted);
}

/* ===== ANIMATION ===== */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">

<h1>From idea → execution plan in seconds</h1>

<div class="subtitle">
  Turn intent into structured action — instantly.
</div>

<div class="subtext">
  No fluff. Just a plan you can execute immediately.
</div>

<div class="input-box">
  <input id="query" placeholder="What do you want to achieve today?" />
  <button onclick="runAI()">Create Plan</button>

  <div class="quick-buttons">
    <button onclick="quickFill('Plan my day for sales')">Sales</button>
    <button onclick="quickFill('Organize my work tasks')">Work</button>
    <button onclick="quickFill('Build a learning routine')">Learning</button>
  </div>
</div>

<div id="loading"></div>
<div id="summary"></div>
<div class="grid" id="output"></div>

</div>

<script>
function quickFill(text){
  document.getElementById("query").value=text;
  runAI();
}

async function runAI(){
  const query=document.getElementById("query").value.trim();
  if(!query) return alert("Enter something");

  const loading=document.getElementById("loading");
  const output=document.getElementById("output");
  const summary=document.getElementById("summary");

  loading.innerHTML="⚡ Thinking like an operator...";
  output.innerHTML="";
  summary.innerHTML="";

  try{
    const res=await fetch("/run",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({query})
    });

    const data=await res.json();
    loading.innerHTML="";

    if(data.mode==="error"){
      summary.innerHTML=`<div class="summary">⚠️ ${data.summary}</div>`;
      return;
    }

    summary.innerHTML=`
      <div class="summary">
        <div style="font-size:12px;opacity:0.5">${data.mode.toUpperCase()} MODE</div>
        ${data.summary}
        <div style="margin-top:10px;font-size:13px;opacity:0.6;">
          Start with: <b>${data.plan[0]?.task||''}</b>
        </div>
      </div>
    `;

    data.plan.forEach(item=>{
      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <b>${item.task}</b>
        <div class="meta">${item.time} • ${item.type}</div>
        <div class="priority">Priority: ${item.priority}</div>
      `;

      output.appendChild(div);
    });

  }catch{
    loading.innerHTML="⚠️ Error connecting";
  }
}

document.getElementById("query").addEventListener("keypress",e=>{
  if(e.key==="Enter") runAI();
});
</script>

</body>
</html>
