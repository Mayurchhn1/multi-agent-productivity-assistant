<!DOCTYPE html>
<html>
<head>
    <title>FlowPlan AI</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #eef2f7, #f8fafc);
            padding: 40px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            text-align: center;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #555;
            margin-bottom: 10px;
        }

        .subtext {
            opacity: 0.6;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        input {
            width: 60%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            background: #6366f1;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #4f46e5;
        }

        .quick-buttons {
            margin-top: 15px;
        }

        .quick-buttons button {
            background: #e5e7eb;
            color: #111;
            margin: 5px;
        }

        .quick-buttons button:hover {
            background: #d1d5db;
        }

        .summary {
            margin-top: 25px;
            padding: 15px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.06);
            text-align: left;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
            text-align: left;
        }

        .meta {
            opacity: 0.6;
            font-size: 13px;
        }

        .priority {
            margin-top: 6px;
            font-weight: 600;
        }

        #loading {
            margin-top: 20px;
            color: #555;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>From idea → execution plan in seconds</h1>

    <div class="subtitle">
        Tell me your goal. I’ll break it into actionable steps you can execute today.
    </div>

    <div class="subtext">
        No fluff. Just a plan you can act on immediately.
    </div>

    <div class="input-box">
        <input type="text" id="query" placeholder="What do you want to achieve today?" />
        <button onclick="runAI()">Create Plan</button>

        <div class="quick-buttons">
            <button onclick="quickFill('Plan my day for sales')">Sales</button>
            <button onclick="quickFill('Organize my work tasks')">Work</button>
            <button onclick="quickFill('Build a learning routine')">Learning</button>
        </div>
    </div>

    <div id="loading"></div>

    <div id="summary"></div>
    <div class="grid" id="output"></div>

</div>

<script>
function quickFill(text) {
    document.getElementById("query").value = text;
    runAI();
}

async function runAI() {
    const query = document.getElementById("query").value.trim();

    if (!query) {
        alert("Enter something to generate a plan");
        return;
    }

    const loading = document.getElementById("loading");
    const output = document.getElementById("output");
    const summaryDiv = document.getElementById("summary");

    loading.innerText = "⚡ Building your execution plan...";
    output.innerHTML = "";
    summaryDiv.innerHTML = "";

    try {
        const res = await fetch("/run", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ query })
        });

        if (!res.ok) {
            throw new Error("API error");
        }

        const data = await res.json();

        loading.innerText = "";

        if (data.mode === "error") {
            summaryDiv.innerHTML = `<div class="summary">⚠️ ${data.summary}</div>`;
            return;
        }

        // Summary
        summaryDiv.innerHTML = `
            <div class="summary">
                <b>${data.mode.toUpperCase()} MODE</b><br><br>
                ${data.summary}
                <div style="margin-top:10px;font-size:13px;opacity:0.6;">
                    Start with: <b>${data.plan[0]?.task || ''}</b>
                </div>
            </div>
        `;

        // Tasks
        data.plan.forEach(item => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <b>${item.task}</b>
                <div class="meta">${item.time} • ${item.type}</div>
                <div class="priority">Priority: ${item.priority}</div>
            `;

            output.appendChild(div);
        });

    } catch (err) {
        loading.innerText = "⚠️ Error connecting to server";
    }
}

// Enter key support
document.getElementById("query").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        runAI();
    }
});
</script>

</body>
</html>
